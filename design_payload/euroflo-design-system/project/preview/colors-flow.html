<!-- @dsCard group="Colors" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--ef-white);font-family:var(--font-sans);padding:26px 30px;box-sizing:border-box}
  .row{display:flex;gap:0;border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 11px;box-sizing:border-box}
  .sw .n{font-size:11px;font-weight:600}
  .sw .h{font-size:10px;font-family:var(--font-mono);opacity:.85}
  .lab{margin-top:14px;font-size:12px;color:var(--ef-500);letter-spacing:.12em;text-transform:uppercase;font-weight:600}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--ef-blue);color:#06243f"><div class="n">Sky</div><div class="h">#2CA7FF</div></div>
    <div class="sw" style="background:var(--ef-blue-400);color:#06243f"><div class="n">Sky 400</div><div class="h">#3FACFA</div></div>
    <div class="sw" style="background:var(--ef-cyan);color:#06243f"><div class="n">Cyan</div><div class="h">#41CDE9</div></div>
    <div class="sw" style="background:var(--ef-cyan-300);color:#06243f"><div class="n">Cyan 300</div><div class="h">#45D6F0</div></div>
    <div class="sw" style="background:var(--ef-foam);color:#06243f"><div class="n">Foam</div><div class="h">#C7E8FF</div></div>
    <div class="sw" style="background:var(--ef-mist);color:#06243f"><div class="n">Mist</div><div class="h">#EAF4FD</div></div>
  </div>
  <div class="lab">Flow accents · sky → cyan → foam</div>
</body></html>
