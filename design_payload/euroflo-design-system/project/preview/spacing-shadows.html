<!-- @dsCard group="Spacing" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--ef-tint);font-family:var(--font-sans);padding:30px 34px;box-sizing:border-box;display:flex;gap:22px;align-items:center}
  .item{flex:1;display:flex;flex-direction:column;align-items:center;gap:12px}
  .card{width:100%;height:70px;background:#fff;border:1px solid var(--ef-200);border-radius:14px}
  .nm{font-size:12px;font-weight:600;color:var(--ef-700)}
</style></head><body>
  <div class="item"><div class="card" style="box-shadow:var(--shadow-xs)"></div><div class="nm">xs</div></div>
  <div class="item"><div class="card" style="box-shadow:var(--shadow-sm)"></div><div class="nm">sm · card</div></div>
  <div class="item"><div class="card" style="box-shadow:var(--shadow-md)"></div><div class="nm">md · hover</div></div>
  <div class="item"><div class="card" style="box-shadow:var(--shadow-lg)"></div><div class="nm">lg · popover</div></div>
  <div class="item"><div class="card" style="box-shadow:var(--shadow-xl)"></div><div class="nm">xl · modal</div></div>
</body></html>
