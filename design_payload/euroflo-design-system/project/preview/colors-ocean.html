<!-- @dsCard group="Colors" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--ef-white);font-family:var(--font-sans);padding:26px 30px;box-sizing:border-box}
  .row{display:flex;gap:0;border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 11px;box-sizing:border-box}
  .sw .n{font-size:11px;font-weight:600;letter-spacing:.01em}
  .sw .h{font-size:10px;font-family:var(--font-mono);opacity:.8}
  .lab{margin-top:14px;font-size:12px;color:var(--ef-500);letter-spacing:.12em;text-transform:uppercase;font-weight:600}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--ef-ink);color:#fff"><div class="n">Ink</div><div class="h">#002453</div></div>
    <div class="sw" style="background:var(--ef-navy);color:#fff"><div class="n">Navy</div><div class="h">#033258</div></div>
    <div class="sw" style="background:var(--ef-deep);color:#fff"><div class="n">Deep</div><div class="h">#003967</div></div>
    <div class="sw" style="background:var(--ef-ocean);color:#fff"><div class="n">Ocean ★</div><div class="h">#024D8B</div></div>
    <div class="sw" style="background:var(--ef-ocean-600);color:#fff"><div class="n">Ocean 600</div><div class="h">#1B6DA4</div></div>
  </div>
  <div class="lab">Brand · Ocean &nbsp;—&nbsp; ★ primary</div>
</body></html>
