<!-- @dsCard group="Type" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--ef-white);font-family:var(--font-sans);padding:24px 32px;box-sizing:border-box}
  .line{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--ef-100)}
  .line:last-child{border:none}
  .tag{width:64px;flex-shrink:0;font-size:11px;color:var(--ef-400);font-family:var(--font-mono)}
  .sample{color:var(--foreground)}
  .h1{font-family:var(--font-display);font-weight:700;font-size:38px;letter-spacing:-.01em}
  .h2{font-weight:600;font-size:24px;letter-spacing:-.01em}
  .h3{font-weight:600;font-size:20px}
  .ti{font-weight:600;font-size:16px}
  .bd{font-weight:400;font-size:16px}
  .sm{font-weight:400;font-size:14px;color:var(--muted-foreground)}
</style></head><body>
  <div class="line"><div class="tag">38 / 700</div><div class="sample h1">Page heading</div></div>
  <div class="line"><div class="tag">24 / 600</div><div class="sample h2">Section heading</div></div>
  <div class="line"><div class="tag">20 / 600</div><div class="sample h3">Subsection</div></div>
  <div class="line"><div class="tag">16 / 600</div><div class="sample ti">Card title</div></div>
  <div class="line"><div class="tag">16 / 400</div><div class="sample bd">Body — the next practical step, in plain English.</div></div>
  <div class="line"><div class="tag">14 / 400</div><div class="sample sm">Secondary / muted — INV-1048 · $4,850 · Invoice</div></div>
</body></html>
