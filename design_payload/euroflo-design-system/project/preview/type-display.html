<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--ef-white);padding:26px 32px;box-sizing:border-box}
  .specimen{font-family:var(--font-display);font-weight:700;font-size:64px;line-height:1.04;letter-spacing:-0.01em;color:var(--ef-navy)}
  .sub{margin-top:10px;display:flex;gap:20px;align-items:baseline}
  .name{font-family:var(--font-display);font-weight:600;font-size:20px;color:var(--ef-ocean)}
  .meta{font-family:var(--font-sans);font-size:12px;color:var(--ef-500)}
  .glyphs{font-family:var(--font-display);font-weight:500;font-size:22px;color:var(--ef-700);margin-top:6px;letter-spacing:.02em}
</style></head><body>
  <div class="specimen">A job that flows</div>
  <div class="sub">
    <div class="name">Reem Kufi Fun</div>
    <div class="meta">Display · brand wordmark &amp; big headlines · weights 400–700</div>
  </div>
  <div class="glyphs">Aa Bb Gg Rr 0123456789 &amp; — Euroflo</div>
</body></html>
