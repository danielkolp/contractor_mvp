<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--ef-white);font-family:var(--font-sans);padding:28px 32px;box-sizing:border-box;display:flex;flex-direction:column;gap:16px}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 18px;border-radius:var(--radius-lg);
    font-family:var(--font-sans);font-weight:600;font-size:14px;border:1px solid transparent;cursor:pointer;transition:all .15s}
  .btn svg{width:16px;height:16px}
  .primary{background:var(--ef-ocean);color:#fff;box-shadow:var(--shadow-sm)}
  .accent{background:var(--ef-orange);color:#fff;box-shadow:0 4px 12px rgba(255,106,0,.22)}
  .outline{background:#fff;color:var(--ef-800);border-color:var(--ef-200);box-shadow:var(--shadow-xs)}
  .ghost{background:transparent;color:var(--ef-700)}
  .ghost:hover{background:var(--ef-100)}
  .sm{height:32px;padding:0 12px;font-size:13px;border-radius:var(--radius-md)}
  .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ef-400);font-weight:600;width:64px}
</style></head><body>
  <div class="row"><span class="lbl">Primary</span>
    <button class="btn primary"><i data-lucide="trending-up"></i>Start with highest value</button>
    <button class="btn accent"><i data-lucide="send"></i>Send follow-up</button>
  </div>
  <div class="row"><span class="lbl">Quiet</span>
    <button class="btn outline"><i data-lucide="plus"></i>Add recovery</button>
    <button class="btn ghost">Not interested</button>
  </div>
  <div class="row"><span class="lbl">Small</span>
    <button class="btn primary sm">They said yes</button>
    <button class="btn outline sm">Mark paid</button>
    <button class="btn ghost sm"><i data-lucide="chevron-down"></i></button>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body></html>
