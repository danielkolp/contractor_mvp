<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--ef-white);font-family:var(--font-sans);
    display:flex;align-items:center;gap:30px;padding:30px 34px;box-sizing:border-box}
  .lock{display:flex;align-items:center;gap:18px}
  .wm{font-family:var(--font-display);font-weight:700;font-size:46px;color:var(--ef-navy);letter-spacing:-0.01em}
  .rule{width:1px;height:84px;background:var(--ef-200)}
  .meta{display:flex;flex-direction:column;gap:7px}
  .meta .k{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ef-500);font-weight:600}
  .meta .v{font-size:14px;color:var(--ef-800);font-weight:500}
</style></head><body>
  <div class="lock">
    <img src="../assets/euroflo-mark.svg" width="92" height="92" alt="Euroflo">
    <div class="wm">Euroflo</div>
  </div>
  <div class="rule"></div>
  <div class="meta">
    <div><div class="k">Mark</div><div class="v">Cresting wave · navy tile</div></div>
    <div><div class="k">Wordmark</div><div class="v">Reem Kufi Fun · 700</div></div>
  </div>
</body></html>
