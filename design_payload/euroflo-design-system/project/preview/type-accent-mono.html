<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--ef-white);font-family:var(--font-sans);padding:24px 32px;box-sizing:border-box;display:flex;gap:30px}
  .col{flex:1}
  .lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ef-500);font-weight:600;margin-bottom:10px}
  .accent{font-family:var(--font-accent);font-weight:700;font-size:42px;color:var(--ef-ocean);line-height:1}
  .accent-note{font-size:12px;color:var(--ef-500);margin-top:6px}
  .mono{font-family:var(--font-mono);font-size:15px;color:var(--ef-800);line-height:1.7}
  .rule{width:1px;background:var(--ef-200);align-self:stretch}
</style></head><body>
  <div class="col">
    <div class="lbl">Caveat · accent</div>
    <div class="accent">clear next steps</div>
    <div class="accent-note">Handwritten flourish on one key phrase. Used rarely, for warmth.</div>
  </div>
  <div class="rule"></div>
  <div class="col">
    <div class="lbl">Geist Mono · numeric</div>
    <div class="mono">$4,850.00<br>INV-1048<br>EST-2211<br>2026-05-31</div>
  </div>
</body></html>
