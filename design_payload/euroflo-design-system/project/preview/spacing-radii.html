<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--ef-white);font-family:var(--font-sans);padding:26px 32px;box-sizing:border-box;display:flex;gap:18px;align-items:flex-end}
  .item{display:flex;flex-direction:column;align-items:center;gap:9px}
  .box{background:var(--ef-mist);border:1.5px solid var(--ef-ocean);width:74px;height:74px}
  .nm{font-size:12px;font-weight:600;color:var(--ef-800)}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--ef-500)}
</style></head><body>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="nm">md</div><div class="px">8px · badge</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="nm">lg</div><div class="px">10px · button</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="nm">xl</div><div class="px">14px · card</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="nm">2xl</div><div class="px">18px · feature</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-full)"></div><div class="nm">full</div><div class="px">pill / avatar</div></div>
</body></html>
