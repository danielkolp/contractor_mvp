<!-- @dsCard group="Colors" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--ef-white);font-family:var(--font-sans);padding:26px 30px;box-sizing:border-box}
  .row{display:flex;gap:0;border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--ef-200)}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 9px;box-sizing:border-box}
  .sw .n{font-size:10px;font-weight:600}
  .sw .h{font-size:9px;font-family:var(--font-mono);opacity:.8}
  .lab{margin-top:14px;font-size:12px;color:var(--ef-500);letter-spacing:.12em;text-transform:uppercase;font-weight:600}
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--ef-50);color:#334155"><div class="n">50</div><div class="h">F8FAFC</div></div>
    <div class="sw" style="background:var(--ef-100);color:#334155"><div class="n">100</div><div class="h">F1F5F9</div></div>
    <div class="sw" style="background:var(--ef-200);color:#334155"><div class="n">200</div><div class="h">E5EBF1</div></div>
    <div class="sw" style="background:var(--ef-300);color:#334155"><div class="n">300</div><div class="h">CBD5E1</div></div>
    <div class="sw" style="background:var(--ef-400);color:#fff"><div class="n">400</div><div class="h">94A3B8</div></div>
    <div class="sw" style="background:var(--ef-500);color:#fff"><div class="n">500</div><div class="h">64748B</div></div>
    <div class="sw" style="background:var(--ef-700);color:#fff"><div class="n">700</div><div class="h">334155</div></div>
    <div class="sw" style="background:var(--ef-900);color:#fff"><div class="n">900</div><div class="h">0F1B2D</div></div>
  </div>
  <div class="lab">Neutrals · cool zinc — borders, text, surfaces</div>
</body></html>
