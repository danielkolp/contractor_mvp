<!-- @dsCard group="Colors" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{width:700px;background:var(--ef-white);font-family:var(--font-sans);padding:26px 30px;box-sizing:border-box;display:flex;align-items:center;gap:26px}
  .big{width:150px;height:120px;border-radius:14px;background:var(--ef-orange);box-shadow:var(--shadow-md);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;color:#fff}
  .big .n{font-weight:700;font-size:15px}
  .big .h{font-family:var(--font-mono);font-size:11px;opacity:.9}
  .stack{display:flex;flex-direction:column;gap:10px;flex:1}
  .mini{display:flex;align-items:center;gap:12px}
  .chip{width:46px;height:46px;border-radius:10px}
  .mini .nm{font-size:13px;font-weight:600;color:var(--ef-800)}
  .mini .hx{font-family:var(--font-mono);font-size:11px;color:var(--ef-500)}
  .note{font-size:12px;color:var(--ef-500);line-height:1.5;margin-top:4px}
</style></head><body>
  <div class="big"><div class="n">Current ★</div><div class="h">#FF6A00</div></div>
  <div class="stack">
    <div class="mini"><div class="chip" style="background:var(--ef-orange-600)"></div><div><div class="nm">Hover</div><div class="hx">#E85D00</div></div></div>
    <div class="mini"><div class="chip" style="background:var(--ef-orange-50);border:1px solid var(--ef-200)"></div><div><div class="nm">Tint 50</div><div class="hx">#FFF1E8</div></div></div>
    <div class="note">The action accent. Reserved for the single most important CTA and money-positive moments — never a background wash.</div>
  </div>
</body></html>
